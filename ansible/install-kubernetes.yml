---
- name: Bootstrap Docker and Kubernetes on EC2
  hosts: kubernetes
  become: true
  vars:
    kubernetes_version: "1.32"
    kubernetes_repo: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/"
    pod_network_cidr: "10.244.0.0/16"
    kubernetes_user: ubuntu
    kubernetes_home: "/home/{{ kubernetes_user }}"
  tasks:
    - name: Install base packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
          - lsb-release
          - software-properties-common
        state: present
        update_cache: true

    - name: Install Docker and containerd
      apt:
        name:
          - docker.io
          - containerd
        state: present
        update_cache: true

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Configure containerd for systemd cgroups
      shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml
      notify: restart containerd

    - name: Disable swap immediately
      shell: swapoff -a
      args:
        warn: false
      changed_when: false

    - name: Disable swap in fstab
      replace:
        path: /etc/fstab
        regexp: '^(.*\s+swap\s+.*)$'
        replace: '# \1'

    - name: Ensure apt keyring directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Kubernetes signing key
      shell: |
        curl -fsSL {{ kubernetes_repo }}Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Configure Kubernetes apt repository
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] {{ kubernetes_repo }} /\n"
        mode: "0644"

    - name: Install Kubernetes packages
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true

    - name: Hold Kubernetes packages at the installed version
      shell: apt-mark hold kubelet kubeadm kubectl
      changed_when: false

    - name: Check whether the control plane is already initialized
      stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_admin_conf

    - name: Initialize the Kubernetes control plane
      command: >
        kubeadm init
        --apiserver-advertise-address={{ ansible_default_ipv4.address }}
        --pod-network-cidr={{ pod_network_cidr }}
      when: not kubeadm_admin_conf.stat.exists

    - name: Create kubeconfig directory for ubuntu
      file:
        path: "{{ kubernetes_home }}/.kube"
        state: directory
        owner: "{{ kubernetes_user }}"
        group: "{{ kubernetes_user }}"
        mode: "0755"

    - name: Copy admin kubeconfig for ubuntu
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "{{ kubernetes_home }}/.kube/config"
        remote_src: true
        owner: "{{ kubernetes_user }}"
        group: "{{ kubernetes_user }}"
        mode: "0600"

    - name: Apply Flannel CNI
      shell: |
        KUBECONFIG={{ kubernetes_home }}/.kube/config kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
      args:
        creates: /etc/kubernetes/.flannel-applied
      when: not kubeadm_admin_conf.stat.exists

    - name: Mark Flannel as applied
      file:
        path: /etc/kubernetes/.flannel-applied
        state: touch
      when: not kubeadm_admin_conf.stat.exists

    - name: Remove the control-plane taint for single-node scheduling
      shell: |
        KUBECONFIG={{ kubernetes_home }}/.kube/config kubectl taint nodes --all node-role.kubernetes.io/control-plane- || true
      changed_when: false

  handlers:
    - name: restart containerd
      systemd:
        name: containerd
        state: restarted
        enabled: true
