<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — LUXEMARKET</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .product-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      padding: 3rem 5%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .product-gallery {
      position: sticky; top: 90px;
      height: fit-content;
    }

    .main-img-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 1;
      margin-bottom: 1rem;
    }

    .main-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .main-img-wrap:hover img { transform: scale(1.04); }

    .thumb-row {
      display: flex; gap: 0.8rem;
    }

    .thumb {
      width: 70px; height: 70px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
    }
    .thumb.active, .thumb:hover { border-color: var(--gold); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    .product-detail-info {
      padding-top: 1rem;
    }

    .pd-category {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 0.7rem;
    }

    .pd-title {
      font-family: var(--ff-display);
      font-size: clamp(2rem, 3vw, 2.8rem);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .pd-rating {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .pd-price-section {
      margin-bottom: 1.8rem;
    }
    .pd-price {
      font-family: var(--ff-display);
      font-size: 2.5rem;
      font-weight: 700;
    }
    .pd-price-old {
      font-size: 1rem;
      color: var(--text3);
      text-decoration: line-through;
      margin-left: 0.5rem;
    }
    .pd-discount {
      display: inline-block;
      background: rgba(76,175,119,0.15);
      color: var(--success);
      border: 1px solid rgba(76,175,119,0.3);
      padding: 0.2rem 0.7rem;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: 0.8rem;
    }

    .pd-description {
      color: var(--text2);
      line-height: 1.8;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .qty-row {
      display: flex; align-items: center; gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .qty-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text2);
    }

    .qty-control {
      display: flex; align-items: center; gap: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .qty-btn {
      width: 36px; height: 36px;
      background: transparent;
      border: none;
      color: var(--text2);
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .qty-btn:hover { color: var(--gold); }

    .qty-display {
      width: 40px; text-align: center;
      font-weight: 600; font-size: 0.95rem;
    }

    .pd-actions {
      display: flex; gap: 1rem;
      margin-bottom: 2rem;
    }
    .pd-actions .btn-primary { flex: 1; justify-content: center; }

    .wish-btn {
      width: 50px; height: 50px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 99px;
      color: var(--text2);
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: var(--transition);
    }
    .wish-btn:hover { border-color: #e44; color: #e44; }

    .pd-features {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .feature-row {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .feature-row:last-child { border-bottom: none; }
    .feature-row i { color: var(--gold); width: 20px; }

    .related-section {
      padding: 4rem 5%;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      .product-detail { grid-template-columns: 1fr; gap: 2rem; }
      .product-gallery { position: static; }
    }
  </style>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-logo" onclick="window.location.href='../index.html'">
    <span class="logo-icon">✦</span>
    <span class="logo-text">LUXE<em>MARKET</em></span>
  </div>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
  </ul>
  <div class="nav-actions">
    <button class="nav-btn" onclick="window.location.href='login.html'" id="loginBtn">
      <i class="fa fa-user"></i> <span id="navUserName">Login</span>
    </button>
    <button class="nav-btn cart-btn" onclick="window.location.href='cart.html'">
      <i class="fa fa-bag-shopping"></i>
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<div class="page-wrapper">
  <div style="padding:1.5rem 5% 0">
    <div class="breadcrumb">
      <a href="../index.html">Home</a> ›
      <a href="shop.html">Shop</a> ›
      <span id="pdBreadcrumb">Product</span>
    </div>
  </div>

  <div class="product-detail" id="productDetail">
    <div style="padding:4rem;text-align:center;color:var(--text2)">Loading...</div>
  </div>

  <div class="related-section">
    <div class="section-header">
      <h2>You Might <em>Also Like</em></h2>
    </div>
    <div class="products-grid" id="relatedGrid"></div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
let currentQty = 1;
let currentProduct = null;

const urlParams = new URLSearchParams(window.location.search);
const productId = parseInt(urlParams.get('id'));

function loadProduct() {
  const product = PRODUCTS.find(p => p.id === productId);
  if (!product) {
    document.getElementById('productDetail').innerHTML = `<div style="padding:4rem;text-align:center;color:var(--text2)">Product not found. <a href="shop.html" style="color:var(--gold)">Back to shop</a></div>`;
    return;
  }
  currentProduct = product;
  document.title = `${product.name} — LUXEMARKET`;
  document.getElementById('pdBreadcrumb').textContent = product.name;

  const discount = product.oldPrice ? Math.round((1 - product.price/product.oldPrice)*100) : 0;
  const stars = '★'.repeat(Math.floor(product.rating)) + '☆'.repeat(5-Math.floor(product.rating));

  document.getElementById('productDetail').innerHTML = `
    <div class="product-gallery">
      <div class="main-img-wrap">
        <img src="${product.image}" alt="${product.name}" id="mainImg"/>
      </div>
      <div class="thumb-row">
        <div class="thumb active"><img src="${product.image}" alt=""/></div>
        <div class="thumb"><img src="${product.image}" alt="" style="filter:brightness(0.85) saturate(0.8)"/></div>
        <div class="thumb"><img src="${product.image}" alt="" style="filter:brightness(1.1) hue-rotate(10deg)"/></div>
      </div>
    </div>
    <div class="product-detail-info">
      <div class="pd-category">${product.category}</div>
      <h1 class="pd-title">${product.name}</h1>
      <div class="pd-rating">
        <span class="stars">${stars}</span>
        <span style="font-weight:600">${product.rating}</span>
        <span style="color:var(--text3);font-size:0.85rem">(${product.reviews} reviews)</span>
        <span style="color:var(--success);font-size:0.85rem"><i class="fa fa-check-circle"></i> ${product.stock} in stock</span>
      </div>
      <div class="pd-price-section">
        <span class="pd-price">₹${product.price.toLocaleString('en-IN')}</span>
        ${product.oldPrice ? `<span class="pd-price-old">₹${product.oldPrice.toLocaleString('en-IN')}</span>` : ''}
        ${discount ? `<span class="pd-discount">${discount}% OFF</span>` : ''}
      </div>
      <p class="pd-description">${product.description}</p>
      <div class="qty-row">
        <span class="qty-label">Quantity</span>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-display" id="qtyDisplay">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>
      <div class="pd-actions">
        <button class="btn-primary" onclick="addToCartDetail()">
          <i class="fa fa-bag-shopping"></i>&nbsp; Add to Cart
        </button>
        <button class="btn-primary" onclick="buyNow()" style="background:var(--bg2);color:var(--text);border:1px solid var(--border)">
          Buy Now
        </button>
        <button class="wish-btn"><i class="far fa-heart"></i></button>
      </div>
      <div class="pd-features">
        <div class="feature-row"><i class="fa fa-truck"></i> Free shipping on orders above ₹999</div>
        <div class="feature-row"><i class="fa fa-rotate-left"></i> 30-day easy returns</div>
        <div class="feature-row"><i class="fa fa-shield"></i> Authentic & quality guaranteed</div>
        <div class="feature-row"><i class="fa fa-tag"></i> Use code <strong style="color:var(--gold)">LUXE50</strong> for 50% off</div>
      </div>
    </div>
  `;

  // Thumbs
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.thumb').forEach(th => th.classList.remove('active'));
      t.classList.add('active');
    });
  });

  // Related
  const related = PRODUCTS.filter(p => p.id !== product.id && p.category === product.category).slice(0, 4);
  document.getElementById('relatedGrid').innerHTML = related.map(p => renderProductCard(p)).join('');
}

function changeQty(delta) {
  currentQty = Math.max(1, Math.min(10, currentQty + delta));
  document.getElementById('qtyDisplay').textContent = currentQty;
}

function addToCartDetail() {
  if (!currentProduct) return;
  Cart.add(currentProduct, currentQty);
  showToast(`${currentProduct.name} ×${currentQty} added to cart!`, 'success');
}

function buyNow() {
  if (!currentProduct) return;
  Cart.add(currentProduct, currentQty);
  window.location.href = 'cart.html';
}

loadProduct();
</script>
<script src="../js/luxechat.js"></script>
</body>
</html>
